name: CI

on:
  push:
  pull_request:

# pnpm version pinned to the root package.json "packageManager" (10.28.2);
# Node from engines (>=20 -> 20); Go from go.work (1.25).
env:
  PNPM_VERSION: "10.28.2"
  NODE_VERSION: "20"
  GO_VERSION: "1.25"

jobs:
  go:
    name: go (sandbox-runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # sandbox-runner has no external deps (no go.sum); disable module
          # cache to avoid setup-go's missing-go.sum lookup failure.
          cache: false
      - name: build
        working-directory: services/sandbox-runner
        run: go build ./...
      - name: vet
        working-directory: services/sandbox-runner
        run: go vet ./...
      - name: test
        working-directory: services/sandbox-runner
        run: go test ./...

  orchestrator:
    name: orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: test
        run: pnpm --filter @acp/orchestrator test
      - name: typecheck
        run: pnpm --filter @acp/orchestrator exec tsc --noEmit -p tsconfig.json

  app:
    name: app (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acp
          POSTGRES_PASSWORD: acp
          POSTGRES_DB: acp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U acp -d acp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://acp:acp@localhost:5432/acp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: migrate
        run: pnpm --filter @acp/app db:migrate
      - name: test
        run: pnpm --filter @acp/app test
      - name: typecheck
        run: pnpm --filter @acp/app exec tsc --noEmit -p tsconfig.json

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: test
        run: pnpm --filter @acp/web test
      - name: build
        run: pnpm --filter @acp/web build

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    # continue-on-error: dev-only advisories (vitest/esbuild) and conditional
    # ones (otel-prometheus, temporal>protobufjs) should surface in the logs
    # without red-walling every PR. Tighten to blocking once those are overridden.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # sandbox-runner has no external deps (no go.sum); disable module
          # cache to avoid setup-go's missing-go.sum lookup failure.
          cache: false
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: services/sandbox-runner
        run: govulncheck ./...
